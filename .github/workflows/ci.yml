name: smarttime-ci

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/ci.yml'
      - 'solver/**'
      - 'backend/functions/**'
      - 'admin-web/**'
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'solver/**'
      - 'backend/functions/**'
      - 'admin-web/**'

jobs:
  solver-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  functions-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - run: npm test

  functions-emulator-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install -g firebase-tools
      - run: firebase emulators:exec --project demo-smarttime --only firestore "npm test -- --runInBand tests/emulator.smoke.test.ts tests/repositories.emulator.test.ts"

  admin-web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
