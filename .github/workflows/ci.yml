name: smarttime-ci

on:
  push:
    paths:
      - 'smarttime-ai/**'
  pull_request:
    paths:
      - 'smarttime-ai/**'

jobs:
  solver-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smarttime-ai/solver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  functions-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smarttime-ai/backend/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
