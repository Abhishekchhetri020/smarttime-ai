name: smarttime_ai
version: 0.1.0+1
environment:
  sdk: ">=3.3.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  http: ^1.2.2
  provider: ^6.1.2
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^8.1.2
  share_plus: ^10.1.2
  csv: ^6.0.0
  excel: ^4.0.6
  synchronized: ^3.1.0
  pdf: ^3.11.3
  printing: ^5.14.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.20.3
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 24

flutter_native_splash:
  color: "#7B906F"
  image: "assets/icon/app_icon.png"
  android: true
  ios: false
  android_12:
    color: "#7B906F"
    image: "assets/icon/app_icon.png"
